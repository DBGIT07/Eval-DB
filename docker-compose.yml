services:
  db:
    image: postgres:16-alpine
    container_name: evaldb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evaldb
      POSTGRES_USER: evaldb
      POSTGRES_PASSWORD: evaldb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evaldb -d evaldb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evaldb-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://evaldb:evaldb@db:5432/evaldb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  ui:
    build:
      context: ./ai-eval-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: evaldb-ui
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
